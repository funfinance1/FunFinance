    id:'am_v5_7', type:'mcq', difficulty:'Intermediate',
    topic:'Portfolio Theory — Drawdown Management',
    character:'clara',
    question:'Why do institutional investors often set maximum drawdown limits for their fund managers rather than relying solely on volatility limits?',
    options:[
      'Drawdown limits are set instead of volatility limits because regulators require all institutional investors to use peak-to-trough loss metrics rather than standard deviation for risk management reporting purposes',
      'Drawdown limits capture tail risk and the path dependency of losses in a way that volatility does not — a fund can have low average volatility but still suffer catastrophic peak-to-trough losses that impair the investor\'s capital',
      'Drawdown limits are administratively simpler than volatility limits because they require no statistical calculations — the fund either exceeds the drawdown threshold or it does not, making compliance straightforward',
      'Drawdown limits are preferred because volatility is always zero for private market funds with quarterly NAV reporting, making volatility an inapplicable risk metric for most institutional portfolios',
    ],
    correct:1,
    explanation:'Volatility measures average dispersion of returns — it treats upside and downside volatility symmetrically and says nothing about the sequence of losses. A fund could have a Sharpe ratio of 1.0 while suffering a 40% peak-to-trough drawdown if the losses were concentrated in one period. Maximum drawdown directly measures the worst cumulative loss an investor would have experienced — which determines whether they can psychologically and practically remain invested through a recovery.',
    perfectAnswer:'Volatility is a symmetric, average measure — it treats a 3% gain and a 3% loss identically, and it cannot distinguish between a portfolio that loses 5% each month for six months (a devastating 30% drawdown) from one that alternates randomly between gains and losses of the same magnitude. Maximum drawdown measures the worst peak-to-trough cumulative loss, which is what actually impairs capital and triggers redemptions. For institutional investors with boards, beneficiaries, and governance committees, a 35% drawdown — even in a fund with good long-run returns — may trigger mandatory redemption decisions or management reviews that force selling at the worst moment. Drawdown limits also capture the path of returns, not just their distribution: a fund that loses 30% and recovers requires a 43% gain just to break even, creating a compounding challenge that volatility measures miss entirely.',
    whyInterviewersLikeIt:'The path dependency argument — a 30% loss requires a 43% gain to break even — is a precise quantitative insight that goes beyond saying "drawdown captures tail risk." It shows why drawdown management matters for compounded returns over time.',
  },

  // ── ADVANCED ──
  {
    id:'am_v5_8', type:'mcq', difficulty:'Advanced',
    topic:'Portfolio Theory — Portable Alpha',
    character:'leo',
    question:'What is a portable alpha strategy and how does it allow institutional investors to separate their market exposure from their alpha generation?',
    options:[
      'Portable alpha is a strategy where institutional investors transfer their investment portfolio to a new custodian bank annually, taking advantage of competitive switching incentives and sign-on bonuses offered by rival custodians',
      'Portable alpha uses derivatives to obtain market beta cheaply, then invests the freed-up capital in an uncorrelated alpha source — separating the decision of which market exposure to hold from where to generate excess returns',
      'Portable alpha is the practice of transferring a fund manager\'s historical track record to a new fund vehicle when they leave their employer, allowing the alpha to be legally attributed to the new fund for marketing purposes',
      'Portable alpha is an ESG strategy that applies the same sustainable investment criteria across all asset classes simultaneously, making the ESG framework portable across equities, bonds, private equity, and real assets',
    ],
    correct:1,
    explanation:'Portable alpha: use derivatives (equity futures or swaps) to replicate a benchmark\'s beta return at low cost and with minimal capital. Take the remaining capital and invest it in an alpha source uncorrelated to the target market — a global macro hedge fund, a market-neutral strategy, or another uncorrelated return stream. The result: you get the benchmark\'s return PLUS the hedge fund\'s alpha, versus just the benchmark if you invested directly. The alpha from the hedge fund is "ported" onto the market exposure obtained via derivatives.',
    perfectAnswer:'Portable alpha exploits the observation that market beta is cheap to obtain via derivatives while genuine alpha is expensive and scarce. Suppose a pension fund wants US equity exposure. Traditional approach: invest $100M directly in the S&P 500. Portable alpha approach: enter $100M of S&P 500 futures contracts (requiring only a small margin deposit, say $10M), then invest the remaining $90M in a market-neutral hedge fund that generates uncorrelated alpha. The futures give full US equity beta; the hedge fund provides excess return uncorrelated to the equity market. Net result: US equity return plus hedge fund alpha, minus fees and the cost of the derivatives. The strategy separates two independent decisions — what market exposure to hold and where to generate alpha — allowing each to be optimised independently. The risk is that the alpha source is not truly uncorrelated: if the hedge fund loses money precisely when equity markets fall, the diversification benefit disappears.',
    whyInterviewersLikeIt:'The concrete numerical example — $10M margin for $100M futures exposure, $90M to the hedge fund — makes portable alpha tangible. The risk caveat — alpha source correlation breaking down in a crisis — shows balanced, sophisticated thinking about why the strategy\'s theory and its practice can diverge.',
  },

    {id:'mkt_v2_4',type:'mcq',difficulty:'Intermediate',topic:'Fixed Income &#8212; Duration',character:'clara',
     question:'Why do long-duration bonds experience larger price swings than short-duration bonds when interest rates change?',
     options:['Long-duration bonds have cash flows further in the future &#8212; and distant cash flows are exponentially more sensitive to discount rate changes, amplifying price swings per unit of rate move','Long-duration bonds carry higher coupon rates that produce larger absolute dollar cash flows, so any percentage change in the discount rate creates a proportionally larger dollar price impact','Long-duration bonds are disproportionately held by retail investors and less sophisticated buyers who systematically overreact to rate changes, creating excess volatility relative to duration','Long-duration bonds are subject to quarterly fair-value mark-to-market requirements under IFRS 9, while short-duration bonds are held at amortized cost with no income statement impact'],
     correct:0,
     explanation:'Price sensitivity comes from where cash flows are in time. PV = CF / (1+r)^t. As t increases, the exponent amplifies rate sensitivity.',
     perfectAnswer:'Duration measures how far in the future, on average, a bond\'s cash flows arrive. Long-duration bonds have cash flows concentrated in the distant future &#8212; and the further out a cash flow is, the more sensitive its present value is to a change in the discount rate. Mathematically, PV = CF / (1+r)^t: as t increases, the exponent amplifies rate sensitivity. A 30-year zero-coupon bond can swing 30% in price on a 1% rate move; a 2-year bond barely moves.',
     whyInterviewersLikeIt:'Showing the discounting math and explaining that the exponent amplifies sensitivity demonstrates you understand WHY duration works the way it does.'},

    {id:'mkt_v2_6',type:'mcq',difficulty:'Intermediate',topic:'Debt &#8212; Revolving Credit Facility',character:'leo',
     question:'Why does a revolving credit facility typically not have a leverage maintenance covenant?',
     options:['The revolver is a liquidity backstop &#8212; if a covenant blocked access exactly when the company is distressed, it would defeat the entire purpose of the facility as a safety net','Revolvers are always secured against a specific collateral package of receivables and inventory, making financial ratio tests redundant since asset values already adequately protect lenders','Banking regulators explicitly prohibit leverage maintenance tests on revolving credit facilities because they would make revolvers functionally identical to term loans under Basel III rules','Revolving credit facilities have rolling 90-day maturities that are continuously re-extended, making quarterly leverage testing logistically impractical for lenders to administer and enforce'],

    {id:'mkt_v2_10',type:'mcq',difficulty:'Intermediate',topic:'Fixed Income &#8212; Bond Pricing',character:'clara',
     question:'A bond trades at a premium to par. What does this tell you about its coupon rate relative to the market yield?',

    {id:'mkt_v2_11',type:'mcq',difficulty:'Advanced',topic:'Fixed Income &#8212; Callable Bonds',character:'leo',
     question:'Why would an issuer want a callable bond, and why do investors demand a higher yield on callable bonds?',
     options:['The issuer can refinance at lower rates if yields fall; investors demand higher yield to compensate for reinvestment risk when bonds get redeemed in a low-rate environment','Callable bonds allow the issuer to extend maturity unilaterally without lender consent, and investors accept a lower yield in exchange for the certainty of a longer income stream','Callable bonds are senior secured instruments where \'callable\' refers to the lender\'s right to call collateral in default &#8212; the yield premium reflects that collateral enforcement option','Callable bonds pay lower coupons because the call feature eliminates default risk by guaranteeing the issuer can repay on any call date, removing credit risk from the equation entirely'],
     correct:0,
     explanation:'Call provisions allow the issuer to redeem bonds early. If rates fall, the issuer refinances at lower rates &#8212; benefiting the issuer. The investor\'s risk: when rates fall and bonds are called, they must reinvest at lower market rates (reinvestment risk). Higher yield compensates for this.',
     perfectAnswer:'If rates fall significantly after issuance, the issuer can call the bonds &#8212; redeem at par &#8212; and refinance at the lower market rate, saving interest expense. From the investor\'s perspective, just when their high-coupon bond is most valuable (low rate environment), it gets taken away. They\'re forced to reinvest proceeds at lower market rates. This reinvestment risk is the cost of the embedded call option, and investors demand higher coupon compensation. The yield premium is effectively the price of the option sold to the issuer.',

      'Central banks control all interest rates by directly setting the prices of every bond, loan, and mortgage in the economy through mandatory rate-setting committees that meet weekly and publish binding price schedules',
      'Central banks set the policy rate — the rate at which commercial banks borrow overnight — and this rate propagates through the economy by anchoring all short-term borrowing costs from which other rates are derived',
      'Central banks control short-term rates by buying and selling foreign currencies in the foreign exchange market, which indirectly influences domestic interest rates through its effect on the money supply',

    correct:1,
    explanation:'The central bank sets the overnight policy rate — the Federal Funds Rate in the US, the ECB\'s main refinancing rate in Europe — at which commercial banks lend to each other overnight. Because all short-term borrowing is referenced against this rate, it anchors the entire short-term yield curve. Higher policy rates raise borrowing costs for businesses and consumers (mortgages, car loans, corporate credit), slowing economic activity and inflation. Lower policy rates stimulate by making credit cheaper.',
    perfectAnswer:'The central bank controls the overnight lending rate between commercial banks — the Federal Funds Rate in the US. Commercial banks must hold reserves and occasionally need to borrow overnight from other banks; the Fed sets the rate at which these transactions occur. Because this rate anchors the cost of all short-term money, it propagates immediately into SOFR (the secured overnight financing rate), Treasury bill yields, and commercial paper rates. From there, it influences the rates on mortgages, auto loans, corporate revolving credit facilities, and savings accounts across the economy. When the Fed raises rates, the cost of every form of credit rises, cooling consumer spending, business investment, and inflation. When it cuts rates, credit becomes cheaper, stimulating economic activity. Long-term rates are influenced but not directly controlled — they reflect the market\'s expectations about where short-term rates will be over the bond\'s life.',

    perfectAnswer:'Higher-than-expected sustained inflation flows through asset classes very differently. Bonds are the clearest loser: inflation erodes the real value of fixed coupon payments, and nominal yields must rise to compensate investors, which drives bond prices down. Long-duration bonds suffer most because their cash flows extend furthest into an inflating future. For equities, the effect is nuanced. Companies with genuine pricing power — those that can raise prices faster than their costs — can maintain real earnings and act as partial inflation hedges. High-multiple growth companies are hurt disproportionately because higher discount rates reduce the present value of distant future cash flows where their value is concentrated. Commodities directly benefit since they are real assets whose prices directly reflect inflation — energy, metals, and agricultural commodities all rise in inflationary environments, which is why they are classic inflation hedges. Real estate is also a real asset, and property values and rents tend to rise with inflation over time, though higher interest rates simultaneously increase mortgage costs, creating a complex net effect on valuations. Cash is the biggest loser in a sustained inflation environment — purchasing power erodes at the inflation rate with no compensating return.',

    correct:1,
    explanation:'MECE: Mutually Exclusive (no overlap — each item belongs to exactly one category) and Collectively Exhaustive (no gaps — all possibilities are covered). It ensures that when you structure a problem into buckets, you\'re not double-counting anything and not missing anything. A non-MECE structure leads to confused analysis, duplicated work, and incomplete conclusions.',
    perfectAnswer:'MECE — Mutually Exclusive, Collectively Exhaustive — is the structural principle that ensures a problem decomposition is complete and non-overlapping. Mutually exclusive means each issue, option, or data point belongs to exactly one bucket — no overlap. Collectively exhaustive means the buckets together cover every possible option or issue — no gaps. Without MECE, analysis becomes messy: you double-count causes, miss alternatives, and draw conclusions from an incomplete picture. In practice, every issue tree, hypothesis, and slide structure at a consulting firm is tested against MECE. It\'s also the foundation of structured communication — if your presentation is MECE, the audience never wonders whether you covered everything or whether two points are saying the same thing.',

// ══════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// FIX 7: Randomize option order so correct answer isn't always option A
function shuffleOptions(q){
  if(q.type!=='mcq') return {...q};
  const correctText = q.options[q.correct];
  const shuffled = shuffle([...q.options]);
  const newCorrect = shuffled.indexOf(correctText);
  return {...q, options:shuffled, correct:newCorrect};
}

// ══════════════════════════════════════════════════
//  PROGRESSION SYSTEM
//  Mastery = answered correctly on first attempt 2+ times
//  Tier gate: must master 60% of current tier before
//  questions from the next tier appear in sessions
// ══════════════════════════════════════════════════
function isMastered(questionId){
  var p = state.questionProgress[questionId];
  return p && p.correct >= 2;
}

function getUserTier(pool){
  var fund  = pool.filter(function(q){ return q.difficulty==='Fundamental'; });
  var inter = pool.filter(function(q){ return q.difficulty==='Intermediate'; });
  var mastFund  = fund.filter(function(q){ return isMastered(q.id); }).length;
  var mastInter = inter.filter(function(q){ return isMastered(q.id); }).length;
  var threshFund  = Math.ceil(fund.length  * 0.6);
  var threshInter = Math.ceil(inter.length * 0.6);
  if(mastFund >= threshFund && mastInter >= threshInter) return 'Advanced';
  if(mastFund >= threshFund) return 'Intermediate';
  return 'Fundamental';
}

function questionScore(q){
  var p = state.questionProgress[q.id] || {correct:0, total:0};
  var levelNum = {Fundamental:0, Intermediate:1, Advanced:2};
  var qLevel = levelNum[q.difficulty] || 0;
  if(p.total === 0) return qLevel * 100;
  if(isMastered(q.id)) return qLevel * 100 + 80;
  var failRate = (p.total - p.correct) / Math.max(p.total, 1);
  return qLevel * 100 + 10 + (1 - failRate) * 30;
}

function buildSession(trackId){
  var trackQ = shuffle([...(QUESTIONS[trackId]||[])].filter(function(q){ return q && q.id; }));
  var genQ   = shuffle([...(QUESTIONS.general||[])].filter(function(q){ return q && q.id; }));
  var pool = (trackId==='general'
    ? genQ
    : trackQ.concat(genQ.filter(function(q){
        return !trackQ.find(function(t){ return t && t.id===q.id; });
      }))
  ).filter(function(q){ return q && q.id && q.difficulty; });

  var tier = getUserTier(pool);
  var tierOrder = {Fundamental:0, Intermediate:1, Advanced:2};
  var userTierNum = tierOrder[tier] || 0;

  var eligible = pool.filter(function(q){
    return (tierOrder[q.difficulty]||0) <= userTierNum;
  });
  if(eligible.length < SESSION_SIZE){
    var nextTier = pool.filter(function(q){
      return (tierOrder[q.difficulty]||0) === userTierNum + 1;
    });
    eligible = eligible.concat(nextTier.slice(0, SESSION_SIZE - eligible.length));
  }

  eligible.sort(function(a, b){ return questionScore(a) - questionScore(b); });
  var session = eligible.slice(0, SESSION_SIZE);
  session.sort(function(a, b){
    return (tierOrder[a.difficulty]||0) - (tierOrder[b.difficulty]||0);
  });
  return session.map(shuffleOptions);
}

function checkTyped(answer, keywords){
  const a = answer.toLowerCase();
  const hits = keywords.filter(k=>a.includes(k.toLowerCase()));
  return hits.length/keywords.length >= 0.3 && answer.trim().length >= 20;
}

function pickReaction(char, correct){
  const pool = correct ? (CHAR_CORRECT[char]||[]) : (CHAR_WRONG[char]||[]);
  return pool[Math.floor(Math.random()*pool.length)] || (correct ? 'Correct!' : 'Not quite!');
}

function confetti(){
  const colors=['#58cc02','#ffd900','#1cb0f6','#ff9600','#ce82ff','#ff86d0'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[i%colors.length]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;animation-duration:${1.5+Math.random()}s;animation-delay:${Math.random()*0.4}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

// ══════════════════════════════════════════════════
//  SUBMIT ANSWER  (FIX 4+5: MCQ auto-submits on click; no separate button)
// ══════════════════════════════════════════════════
function submitAnswer(){
  const q = state.queue[0];
  if(!q || state.phase!=='question') return;

  let isCorrect;
  if(q.type==='mcq'){
    if(state.selectedOption===null) return;
    isCorrect = state.selectedOption===q.correct;
  } else {
    if(state.typedText.trim().length<20) return;
    isCorrect = checkTyped(state.typedText, q.keywords);
  }

  // Record first attempt
  const isFirstAttempt = !(q.id in state.firstAttempts);
  if(isFirstAttempt) state.firstAttempts[q.id] = isCorrect;

  let xpEarned = 0;
  if(isCorrect){
    xpEarned = isFirstAttempt ? XP_FIRST_TRY : XP_RETRY;
    state.user.xp += xpEarned;
    state.sessionXPEarned += xpEarned;
    state.queue.shift(); // FIX 6: remove from queue only when correct
  } else {
    // FIX 6: no XP for wrong; push to end of queue for retry
    const failed = state.queue.shift();
    state.queue.push(failed);
  }

  state.lastResult = {
    correct: isCorrect,
    reaction: pickReaction(q.character, isCorrect),
    xpEarned,
    question: q,
    selectedOption: state.selectedOption,
    isFirstAttempt,
    typedText: state.typedText,
  };

  // Save attempt to Supabase (fire-and-forget, doesn't block UI)
  if (isFirstAttempt) saveQuestionAttempt(q.id, isCorrect);

  state.phase = 'feedback';
  if(isCorrect) confetti();
  render();
}

function nextQuestion(){
  if(state.queue.length===0){
    state.user.streak++;
    state.user.sessions++;
    // Persist updated profile to Supabase
    saveProfile();
    state.screen='complete';
    confetti();
    render();
  } else {
    state.phase='question';
    state.selectedOption=null;
    state.typedText='';
    render();
  }
}

    </div>
    <div class="feedback-banner ${bannerClass}">
      <div class="feedback-label ${labelClass}">${labelText}</div>
      <div style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span>${char.name}: "${res&&res.reaction}"</span>
        ${isCorrect ? xpBadgeHtml : '<span style="font-size:11px;color:var(--retry);">+0 XP &mdash; queued for retry</span>'}
      </div>
    </div>
    ${q.type==='mcq'?`<div style="margin-bottom:12px;">${optionsHtml}</div>`:''}
    ${q.type==='typed' ? (function(){
      var kw = q.keywords || [];
      var userText = (res&&res.typedText)||state.typedText||'';
      var a = userText.toLowerCase();
      var matched = kw.filter(function(k){return a.includes(k.toLowerCase());});
      var missed  = kw.filter(function(k){return !a.includes(k.toLowerCase());});
      var pills = kw.map(function(k){
        var hit = a.includes(k.toLowerCase());
        var bg  = hit ? '#0a1f05' : '#200808';
        var col = hit ? 'var(--correct)' : 'var(--wrong)';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;margin:2px;background:'+bg+';color:'+col+';">'+k+'</span>';
      }).join('');
      return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:10px;">'
        +'<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Key concepts matched '+matched.length+'/'+kw.length+'</div>'
        +'<div>'+pills+'</div>'
        +'</div>';
    })() : ''}
    <div class="explanation-box">
      <strong>Explanation:</strong> ${q.explanation}<br><br>
      <strong>Perfect answer:</strong> ${q.perfectAnswer}<br><br>
      <strong style="color:var(--xp)">Why interviewers like it:</strong> ${q.whyInterviewersLikeIt}
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary btn-full" id="btn-next" style="background:${tc};color:#000;">${btnLabel}</button>
    </div>
  </div>`;
}

function renderComplete(){

  const total = state.originalCount;
  const pct = Math.round((firstTryCorrect/total)*100);
  const tc = state.track&&state.track.color||'var(--text)';

    <path d="M36 26 C36 26 30 34 30 40 C30 46 33 50 36 51 C39 50 42 46 42 40 C42 34 36 26 36 26Z" fill="#ffb800"/>

    <line x1="44" y1="51" x2="44" y2="58" stroke="#58cc02" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6"/>

    <path d="M36 24 L57 27 L57 56 L36 53Z" fill="#1e1600" stroke="#c88800" stroke-width="1.4" stroke-linejoin="round"/>
    <rect x="33.5" y="24" width="5" height="29" rx="1" fill="#c88800" fill-opacity="0.9"/>
    <line x1="20" y1="34" x2="33" y2="33" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="20" y1="39" x2="33" y2="38" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="20" y1="44" x2="30" y2="43" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="39" y1="33" x2="52" y2="34" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="39" y1="38" x2="52" y2="39" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="39" y1="43" x2="50" y2="44" stroke="#7a5500" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M36 11 L38 16.5 L44 16.5 L39.5 20 L41 25.5 L36 22 L31 25.5 L32.5 20 L28 16.5 L34 16.5Z" fill="#ffd900" stroke="#e0a800" stroke-width="0.6"/>

  const SVG_SWEAT = `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">

  let emoji=SVG_SWEAT, msg='Keep grinding &#8212; it takes reps.';

  else if(pct>=60){emoji=SVG_STRONG;msg='Solid work. Review the explanations and run it back.';}
  else if(pct>=40){emoji=SVG_BOOK;msg='Getting there. The fundamentals will click soon.';}

  </div>`;
}

// ══════════════════════════════════════════════════
//  RENDER + EVENTS
// ══════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  try {
    switch(state.screen){
      case 'loading':   app.innerHTML=renderLoading();   break;
      case 'auth':      app.innerHTML=renderAuth();      break;
      case 'splash':    app.innerHTML=renderSplash();    break;
      case 'name':      app.innerHTML=renderName();      break;
      case 'track':     app.innerHTML=renderTrack();     break;
      case 'dashboard': app.innerHTML=renderDashboard(); break;
      case 'session':   app.innerHTML=renderSession();   break;
      case 'complete':  app.innerHTML=renderComplete();  break;
    }
  } catch(err) {
    app.innerHTML = '<div style="padding:24px;color:#ff4b4b;font-family:monospace;font-size:13px;max-width:520px;">'
      + '<strong>Debug error (screen: ' + state.screen + ')</strong><br><br>'
      + err.message + '<br><br>'
      + (err.stack||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      + '</div>';
    console.error('Render error:', err);
    return;
  }
  bindEvents();
  if(state.screen==='name') { var _ni=document.getElementById('name-input');if(_ni)_ni.focus(); }
  if(state.screen==='auth') {
    var firstInput = state.authMode==='signup'
      ? document.getElementById('auth-name')
      : document.getElementById('auth-email');
    if(firstInput) firstInput.focus();
  }
}

function bindEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  // ── AUTH SCREEN ──────────────────────────────
  on('auth-toggle','click',()=>{
    state.authMode = state.authMode==='login' ? 'signup' : 'login';
    render();
  });

  on('btn-auth-submit','click', async ()=>{
    var btn      = $('btn-auth-submit');
    var errBox   = $('auth-error');
    var email    = ($('auth-email')&&$('auth-email').value||'').trim();
    var password = ($('auth-password')&&$('auth-password').value||'').trim();
    var fullName = ($('auth-fullname')&&$('auth-fullname').value||'').trim();
    var username = ($('auth-username')&&$('auth-username').value||'').trim().toLowerCase();

    // Validation
    if(!email || !password){ showAuthError('Please fill in all fields.'); return; }
    if(state.authMode==='signup'){
      if(!fullName){ showAuthError('Please enter your full name.'); return; }
      if(!username){ showAuthError('Please choose a username.'); return; }
      if(username.length < 3){ showAuthError('Username must be at least 3 characters.'); return; }
      if(!/^[a-z0-9_]+$/.test(username)){ showAuthError('Username can only contain letters, numbers, and underscores.'); return; }
    }
    if(password.length < 6){ showAuthError('Password must be at least 6 characters.'); return; }

    btn.disabled = true;
    btn.textContent = state.authMode==='login' ? 'Signing in...' : 'Creating account...';

    // Check username availability before signup
    if(state.authMode==='signup'){
      var uCheck = await db.from('profiles').select('id').eq('username', username).maybeSingle();
      if(uCheck.data){ showAuthError('That username is taken. Please choose another.'); btn.disabled=false; btn.innerHTML='Create Account &#8594;'; return; }
    }

    var result = state.authMode==='login'
      ? await authSignIn(email, password)
      : await authSignUp(email, password, fullName, username);

    if(result.error){
      showAuthError(friendlyAuthError(result.error.message));
      btn.disabled = false;
      btn.innerHTML = state.authMode==='login' ? 'Sign In &#8594;' : 'Create Account &#8594;';
      return;
    }

    var userId = result.data&&result.data.user&&result.data.user.id;
    if(!userId && result.data&&result.data.session){
      userId = result.data.session.user.id;
    }
    if(userId){
      state.userId = userId;
      state.screen = 'loading';
      render();
      await loadUserData(userId);
      state.screen = 'track';
      render();
    }
  });

  // Allow Enter key on auth form
  ['auth-email','auth-password','auth-fullname','auth-username'].forEach(function(id){
    on(id,'keydown',function(e){
      if(e.key==='Enter') {
        var btn=$('btn-auth-submit');
        if(btn&&!btn.disabled) btn.click();
      }
    });
  });

  // Sign out
  on('btn-signout','click', authSignOut);

  // ── REST OF EVENTS ───────────────────────────
  function doSubmitName(){
    const val=($('name-input')&&$('name-input').value||'').trim();
    if(!val){$('name-input')&&$('name-input').classList.add('anim-shake');setTimeout(()=>$('name-input')&&$('name-input').classList.remove('anim-shake'),500);return;}
    state.user.name=val;state.screen='track';render();
  }

  // SPLASH
  on('btn-start','click',()=>{state.screen='name';render();});

  // NAME
  on('btn-back-splash','click',()=>{state.screen='splash';render();});
  on('btn-name-next','click',doSubmitName);
  on('name-input','keydown',e=>{if(e.key==='Enter') doSubmitName();});

  // TRACK &#8212; clicking a card navigates directly (handled in querySelectorAll above)
  document.querySelectorAll('.track-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const id=card.dataset.track;
      state.track=TRACKS.find(t=>t.id===id)||null;
      state.screen='dashboard';
      render();
    });
  });

  // DASHBOARD
  on('btn-start-session','click',()=>{
    const questions=buildSession(state.track.id);
    state.queue=[...questions];
    state.originalQuestions=[...questions];
    state.originalCount=questions.length;
    state.firstAttempts={};
    state.sessionXPEarned=0;
    state.lastResult=null;
    state.phase='question';
    state.selectedOption=null;
    state.typedText='';
    state.screen='session';
    render();
  });
  on('btn-change-track','click',()=>{state.screen='track';render();});

  // SESSION — question phase
  // MCQ: click submits immediately
  document.querySelectorAll('.option-btn[data-opt]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.phase!=='question') return;
      state.selectedOption=parseInt(btn.dataset.opt);
      submitAnswer();
    });
  });

  // MCQ: A/B/C/D keyboard shortcuts
  if(state.screen==='session' && state.phase==='question'){
    document.addEventListener('keydown', function abcdHandler(e){
      if(state.screen!=='session' || state.phase!=='question'){
        document.removeEventListener('keydown', abcdHandler); return;
      }
      var q = state.queue[0];
      if(!q || q.type!=='mcq') return;
      var map = {a:0, b:1, c:2, d:3};
      var key = e.key.toLowerCase();
      if(key in map && map[key] < q.options.length){
        e.preventDefault();
        state.selectedOption = map[key];
        submitAnswer();
      }
    });
  }

  // FIX 5: Typed answer &#8212; Enter submits (Shift+Enter = new line)
  const typedEl=$('typed-answer');
  if(typedEl){
    typedEl.addEventListener('input',()=>{
      state.typedText=typedEl.value;
      const canSubmit=state.typedText.length>=20;
      const btn=$('btn-submit');
      if(btn){btn.disabled=!canSubmit;btn.classList.toggle('btn-disabled',!canSubmit);}
    });
    typedEl.addEventListener('keydown',e=>{
      if(e.key==='Enter' && !e.shiftKey){
        if(state.typedText.length>=20){
          e.preventDefault();
          e.stopPropagation();
          submitAnswer();
        }
      }
    });
  }
  on('btn-submit','click',submitAnswer);

  // FEEDBACK &#8212; next
  // Enter advances from feedback screen — keeps full keyboard flow
  if(state.screen==='session' && state.phase==='feedback'){
    document.addEventListener('keydown', function enterNext(e){
      if(state.screen!=='session' || state.phase!=='feedback'){
        document.removeEventListener('keydown', enterNext); return;
      }
      if(e.key==='Enter'){e.preventDefault(); nextQuestion();}
    });
  }

  on('btn-next','click',nextQuestion);

  // COMPLETE
  on('btn-play-again','click',()=>{
    const questions=buildSession(state.track.id);
    state.queue=[...questions];
    state.originalQuestions=[...questions];
    state.originalCount=questions.length;
    state.firstAttempts={};
    state.sessionXPEarned=0;
    state.lastResult=null;
    state.phase='question';
    state.selectedOption=null;
    state.typedText='';
    state.screen='session';
    render();
  });
  on('btn-change-track-end','click',()=>{state.screen='track';render();});
}

function showAuthError(msg){
  var box = document.getElementById('auth-error');
  if(box){ box.textContent=msg; box.classList.add('show'); }
}

function friendlyAuthError(msg){
  if(!msg) return 'Something went wrong. Please try again.';
  var m = msg.toLowerCase();
  if(m.includes('invalid login') || m.includes('invalid credentials')) return 'Incorrect email or password.';
  if(m.includes('user already registered') || m.includes('already registered')) return 'An account with this email already exists. Sign in instead.';
  if(m.includes('email not confirmed')) return 'Please check your email to confirm your account.';
  if(m.includes('password')) return 'Password must be at least 6 characters.';
  return msg;
}

// Boot: check if user already has a session
(async function boot(){
  render(); // show loading spinner

  var sessionRes = await db.auth.getSession();
  var session = sessionRes&&sessionRes.data&&sessionRes.data.session;

  if(session && session.user){
    state.userId = session.user.id;
    await loadUserData(session.user.id);
    state.screen = 'track';
  } else {
    state.screen = 'auth';
  }
  render();
})();
</script>
