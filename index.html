<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunFinance — Finance Interview Training</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Space+Mono:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--text:#f0f0f0;--muted:#888;--c-ib:#58cc02;--c-pe:#ffd900;--c-am:#1cb0f6;--c-markets:#ff9600;--c-consulting:#ce82ff;--c-general:#ff86d0;--correct:#58cc02;--wrong:#ff4b4b;--retry:#ff9600;--xp:#ffd900}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.font-hero{font-family:'Nunito',sans-serif;font-weight:900}
.font-mono{font-family:'Space Mono',monospace;font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(720deg);opacity:0}}
.anim-up{animation:fadeUp .4s ease both}
.anim-up-1{animation:fadeUp .4s .08s ease both}
.anim-up-2{animation:fadeUp .4s .16s ease both}
.anim-shake{animation:shake .4s ease}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.screen{width:100%;max-width:520px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:transform .15s,opacity .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--muted)}
.btn-full{width:100%}
.btn-disabled{opacity:.4;cursor:not-allowed}
.xp-bar-track{background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.xp-bar-fill{height:100%;border-radius:99px;background:var(--xp);transition:width .6s ease}
.track-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.track-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;transition:border-color .2s,transform .15s;text-align:left}
.track-card:hover{transform:translateY(-2px)}
.track-card.selected{background:var(--surface2)}
.track-avatar{width:52px;height:52px;margin-bottom:12px;border-radius:50%;overflow:hidden}
.track-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;margin-bottom:4px}
.track-sub{font-size:12px;color:var(--muted)}
.option-btn{width:100%;text-align:left;padding:14px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px;line-height:1.5;display:flex;align-items:flex-start;gap:0}
.option-btn:hover{border-color:var(--muted);background:var(--surface2)}
.option-btn.reveal-correct{border-color:var(--correct);background:#0a1f05;color:var(--correct);cursor:default}
.option-btn.reveal-wrong{border-color:var(--wrong);background:#200a0a;color:var(--wrong);cursor:default}
.option-btn.reveal-neutral{cursor:default;opacity:.5}
.typed-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;resize:vertical;min-height:120px;transition:border-color .15s}
.typed-input:focus{outline:none;border-color:var(--muted)}
.typed-input::placeholder{color:var(--muted)}
.feedback-banner{padding:16px 20px;border-radius:12px;margin-bottom:16px}
.feedback-correct{background:#0a2005;border:1px solid var(--correct)}
.feedback-wrong{background:#200808;border:1px solid var(--wrong)}
.feedback-retry{background:#1a0f00;border:1px solid var(--retry)}
.feedback-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;margin-bottom:6px}
.feedback-label.correct{color:var(--correct)}
.feedback-label.wrong{color:var(--wrong)}
.feedback-label.retry{color:var(--retry)}
.progress-dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s,transform .2s}
.dot.done-correct{background:var(--correct)}
.dot.done-retry{background:var(--retry)}
.dot.active{background:var(--text);transform:scale(1.3)}
.stat-row{display:flex;gap:12px;margin-bottom:16px}
.stat-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.badge{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:confettiFall linear forwards}
.name-input{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:16px 20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:18px;text-align:center;transition:border-color .15s}
.name-input:focus{outline:none;border-color:var(--muted)}
.char-bubble{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.char-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden}
.char-speech{background:var(--surface2);border:1px solid var(--border);border-radius:0 12px 12px 12px;padding:12px 16px;font-size:13px;color:var(--muted);flex:1;line-height:1.5;font-style:italic}
.diff-fundamental{background:#1a2e0a;color:var(--correct)}
.diff-intermediate{background:#1f1800;color:var(--xp)}
.diff-advanced{background:#200a0a;color:var(--wrong)}
.explanation-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;max-height:200px;overflow-y:auto;font-size:13px;line-height:1.7;color:var(--muted)}
.explanation-box strong{color:var(--text)}
.explanation-box::-webkit-scrollbar{width:4px}
.explanation-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}

/* ── Auth screens ── */
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:420px}
.auth-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;margin-bottom:12px;transition:border-color .15s;outline:none}
.auth-input:focus{border-color:var(--muted)}
.auth-input::placeholder{color:var(--muted)}
.auth-error{background:#200808;border:1px solid var(--wrong);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--wrong);margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-link{color:var(--muted);font-size:13px;text-align:center;margin-top:16px;cursor:pointer}
.auth-link span{color:var(--text);text-decoration:underline;cursor:pointer}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:60vh}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.signout-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'DM Sans',sans-serif}
.signout-btn:hover{color:var(--text)}
</style>
</head>

// ══════════════════════════════════════════════════

const SUPA_URL = 'https://zvtmnhadzoqvptgfzqwn.supabase.co';

// ── Auth helpers ──────────────────────────────────
async function authSignUp(email, password, fullName, username) {
  var r = await db.auth.signUp({
    email: email,
    password: password,
    options: { data: { full_name: fullName, username: username } }
  });
  // If signup succeeded, also update the profile with full_name and username
  if (r.data && r.data.user) {
    await db.from('profiles').update({
      full_name: fullName,
      username:  username
    }).eq('id', r.data.user.id);
  }
  return r;
}

async function authSignIn(email, password) {
  return await db.auth.signInWithPassword({ email: email, password: password });
}

async function authSignOut() {
  await db.auth.signOut();
  // Reset state fully
  state.userId = null;
  state.user = { name:'', xp:0, streak:0, sessions:0 };
  state.track = null;
  state.questionProgress = {};
  state.screen = 'auth';
  render();
}

// ── Data helpers ──────────────────────────────────
async function loadUserData(userId) {
  // Load profile
  var pRes = await db.from('profiles').select('*').eq('id', userId).single();
  if (pRes.data) {
    state.user.name     = pRes.data.username || pRes.data.full_name || 'Analyst';
    state.user.xp       = pRes.data.xp || 0;
    state.user.streak   = pRes.data.streak || 0;
    state.user.sessions = pRes.data.sessions_completed || 0;
  }

  // Load question progress
  var qRes = await db.from('question_progress').select('*').eq('user_id', userId);
  if (qRes.data) {
    state.questionProgress = {};
    qRes.data.forEach(function(row) {
      state.questionProgress[row.question_id] = {
        correct: row.correct_attempts || 0,
        total:   row.total_attempts || 0
      };
    });
  }
}

async function saveProfile() {
  if (!state.userId) return;
  await db.from('profiles').update({
    xp:                  state.user.xp,
    streak:              state.user.streak,
    sessions_completed:  state.user.sessions
  }).eq('id', state.userId);
}

async function saveQuestionAttempt(questionId, correct) {
  if (!state.userId) return;
  var existing = state.questionProgress[questionId] || { correct: 0, total: 0 };
  var newCorrect = existing.correct + (correct ? 1 : 0);
  var newTotal   = existing.total + 1;

  // Update local cache immediately (optimistic)
  state.questionProgress[questionId] = { correct: newCorrect, total: newTotal };

  // Fire-and-forget to DB
  db.from('question_progress').upsert({
    user_id:          state.userId,
    question_id:      questionId,
    correct_attempts: newCorrect,
    total_attempts:   newTotal,
    last_seen_at:     new Date().toISOString()
  }, { onConflict: 'user_id,question_id' });
}

function getLevel(xp){
  const lvl = Math.min(Math.floor(xp/XP_PER_LEVEL), LEVELS.length-1);

}

    whyInterviewersLikeIt:'Working through the arithmetic rather than just stating the direction — and showing that a 10% revenue decline causes a 90% profit collapse — makes the operating leverage concept viscerally clear. This is the kind of quantified reasoning that impresses interviewers.',
  },
  {
    id:'gen_v5_7', type:'mcq', difficulty:'Intermediate',

    character:'clara',
    question:'A company acquired a business for $500M three years ago. The acquired unit\'s fair value is now estimated at $350M. What happens on the financial statements?',
    options:[
      'Nothing happens immediately — the goodwill impairment will only be recorded when the business unit is eventually sold, at which point the loss is recognised as a disposal gain or loss on the income statement',
      'A goodwill impairment charge of $150M flows through the income statement as a non-cash loss, reducing net income and retained earnings, while goodwill on the balance sheet is written down by the same amount',
      'The $150M decline in fair value is recorded directly in Other Comprehensive Income and does not affect net income or the income statement until the impairment is deemed permanent by the auditors',
      'The company must immediately raise $150M of new equity to restore the balance sheet to its original total asset value, with the proceeds credited directly to the goodwill account on the asset side',

    correct:1,
    explanation:'Annual impairment testing under ASC 350: if the fair value of the reporting unit ($350M) falls below its carrying value ($500M), goodwill must be written down by the difference ($150M). This flows through the income statement as an impairment loss — a non-cash charge that reduces pre-tax income, taxes, and net income. The goodwill balance on the balance sheet falls by $150M; retained earnings fall by the after-tax amount.',
    perfectAnswer:'Under ASC 350, companies must test goodwill for impairment at least annually. If the fair value of the reporting unit ($350M) is below its book value ($500M), the company records a goodwill impairment of $150M. This charge flows through the income statement as a non-cash operating expense, reducing pre-tax income by $150M. After applying the tax rate, net income and retained earnings fall by the after-tax amount. On the balance sheet, goodwill decreases by $150M. Because it\'s non-cash, it\'s added back on the cash flow statement — so operating cash flow is unaffected. Investors closely watch goodwill impairments as a signal that management overpaid for an acquisition.',
    whyInterviewersLikeIt:'The non-cash nature of the charge — income statement impact but no cash flow impact — is the key nuance. Noting that investors use impairments as a signal of acquisition overpayment shows you understand the economic meaning beyond the accounting mechanics.',
  },
  {
    id:'gen_v5_8', type:'mcq', difficulty:'Intermediate',
    topic:'Valuation — WACC Components',
    character:'victor',
    question:'Why is the cost of debt adjusted for taxes in the WACC formula, but the cost of equity is not?',
    options:[
      'Debt interest is tax-deductible for the company, creating a real tax shield that reduces the effective cost of debt — equity dividends are paid from after-tax income and receive no equivalent tax deduction',
      'The cost of equity is adjusted for taxes indirectly through the equity risk premium, which already incorporates the tax environment into the market\'s required return on equity capital',
      'Debt is adjusted for taxes because lenders demand a guaranteed pre-tax return; equity holders accept a post-tax return because they benefit from the lower capital gains tax rate on stock appreciation',
      'Both debt and equity costs are adjusted for taxes in WACC — the cost of equity adjustment is simply less visible because it is embedded within the beta calculation rather than shown as a separate line item',
    ],
    correct:0,
    explanation:'Interest on debt is tax-deductible — the government effectively subsidises the cost of debt financing. If a company pays 6% interest and has a 25% tax rate, the real after-tax cost is 6% × (1 - 25%) = 4.5%. Dividends and equity returns are paid from after-tax profit — there is no equivalent tax deduction. Using pre-tax cost of debt in WACC would overstate the company\'s true cost of capital by ignoring this subsidy.',
    perfectAnswer:'Interest expense on debt is tax-deductible, which means the government effectively subsidises debt financing. A company paying 6% on a loan with a 25% tax rate has an effective after-tax cost of 4.5% because the interest reduces taxable income by 6%, saving 1.5% in taxes. This tax shield is real cash that stays with the company. Equity returns — dividends and capital appreciation — are not deductible; they are paid from after-tax profit. So the cost of equity already reflects a post-tax world and needs no further adjustment. The tax adjustment on debt captures the actual economic cost of each financing source, which is what WACC is designed to measure.',
    whyInterviewersLikeIt:'The tax shield on debt is one of the core reasons companies prefer debt to equity in their capital structures. Candidates who explain it as a government subsidy and walk through the arithmetic — 6% × (1-25%) = 4.5% — show they understand the economic substance, not just the formula.',
  },

    {id:'ib_v2_1',type:'mcq',difficulty:'Fundamental',topic:'Valuation &#8212; EV vs. Equity Value',character:'victor',

    perfectAnswer:'Enterprise value equals market capitalisation plus total debt plus preferred stock plus minority interest, minus cash and cash equivalents. The intuition: if you acquired 100% of a company\'s equity at market cap, you would also assume all of its debt obligations — so they are added. Preferred stock is a fixed claim senior to equity, also added. Minority interest represents outside ownership of subsidiaries that you\'re implicitly acquiring — also added. Cash is subtracted because it can be immediately used to offset the acquisition cost; you\'re effectively getting it back the moment you close. EV is the "debt-free, cash-free" acquisition price — the total cost to own the operating business.',
    whyInterviewersLikeIt:'EV is the most fundamental valuation concept in corporate finance. The best answers explain the intuition — not just the formula — connecting each component to what it represents in the context of a total acquisition cost.',
  },
  {

    question:'What are the four most common strategic rationales behind corporate acquisitions?',
    options:[
      'Tax avoidance, regulatory arbitrage, management ego, and access to government subsidies — these are the real motivations behind most large acquisitions even when companies claim strategic rationales publicly',
      'Revenue synergies, cost synergies, buying capabilities or technology, and entering new markets — acquirers pay premiums when they believe the combined entity is worth more than the two standalone businesses',
      'Reducing competition, eliminating key employees, accessing patents for litigation, and improving reported earnings through acquisition accounting — these represent the full set of motivations observed in practice',
      'Increasing share count, boosting earnings per share, reducing the stock price to a more accessible level, and attracting retail investors who prefer lower-priced shares in the market',

    correct:1,
    explanation:'Acquisitions happen when an acquirer believes the combined entity creates more value than the sum of the parts. The four main strategic rationales: (1) Revenue synergies — cross-sell, expand geographies, combine customer bases; (2) Cost synergies — eliminate duplicate overhead, improve procurement; (3) Acquire capabilities — buy technology, IP, talent, or a business model the acquirer cannot build fast enough; (4) Enter a new market — buy market share rather than trying to build it organically.',
    perfectAnswer:'Companies acquire for four primary reasons. Revenue synergies: the combined entity can sell more than either could separately — by cross-selling to each other\'s customer bases, entering new geographies, or bundling products. Cost synergies: merging eliminates duplicated functions — one finance team instead of two, combined procurement spend with better pricing, shared manufacturing infrastructure. Capability acquisition: when organic development is too slow or uncertain, buying a company is the fastest way to acquire technology, intellectual property, or a proven management team. Market entry: acquiring an established player with existing market share and relationships is faster and less risky than building from zero in an unfamiliar market. The acquirer pays a premium when they believe these sources of value creation exceed the control premium required to win the deal.',

  {
    id:'ib_v5_3', type:'mcq', difficulty:'Fundamental',
    topic:'Valuation — Comparable Company Analysis Steps',
    character:'victor',
    question:'Walk me through the high-level steps to build a comparable company analysis.',
    options:[
      'Identify peers, pull their stock prices, average the prices, and apply that average to the target\'s share count — this gives a market-based valuation that accounts for current trading conditions across the sector',
      'Identify comparable public companies, gather their financial metrics, calculate relevant trading multiples, apply those multiples to the target\'s metrics, and derive an implied valuation range',
      'Find the target\'s closest competitor, take that company\'s market cap, and adjust it by the revenue differential between the target and the comparable to arrive at a proportional target valuation',
      'Screen all public companies by market cap above $1 billion, calculate their average P/E ratio, and apply that ratio directly to the target\'s most recent annual earnings per share figure',
    ],
    correct:1,
    explanation:'Trading comps in five steps: (1) Select comparable companies based on industry, business model, size, and growth profile; (2) Gather their financial data — LTM revenue, EBITDA, earnings, and projected figures; (3) Calculate multiples — EV/Revenue, EV/EBITDA, P/E; (4) Analyse the range and select appropriate benchmarks; (5) Apply those multiples to the target\'s own metrics to derive an implied valuation range. The quality of the output depends almost entirely on the quality of the comparable selection.',
    perfectAnswer:'Trading comps follows five steps. First, select the peer group: companies in the same industry with similar business models, growth rates, margins, and scale. This is the most judgement-intensive step and the biggest source of error. Second, gather and spread financials: LTM revenue, EBITDA, EBIT, and net income, plus forward estimates from consensus. Calendarise so all LTM periods are comparable. Third, calculate multiples: EV/Revenue, EV/EBITDA, EV/EBIT, and P/E. Fourth, analyse the distribution — look at median, mean, and inter-quartile range. Exclude outliers with valid reasons. Fifth, apply the selected multiple range to the target\'s equivalent metric to produce a valuation range. Present as a football field alongside DCF and precedent transactions.',
    whyInterviewersLikeIt:'Walking through all five steps cleanly and noting that peer selection is the most judgement-intensive — and most error-prone — step signals genuine comps experience. The calendarisation reference and football field mention show contextual awareness of how comps fit into a broader valuation.',

  {
    id:'ib_v5_4', type:'mcq', difficulty:'Fundamental',
    topic:'M&A — What Happens to the Target\'s Stock Price on Announcement?',
    character:'victor',
    question:'When a takeover bid is announced, what typically happens to the target company\'s share price and why?',
    options:[
      'The target\'s share price usually falls on announcement because the market interprets the deal as a sign that the target has been struggling operationally and needed an outside party to rescue it from decline',
      'The target\'s share price typically jumps toward the offer price, reflecting the acquisition premium — but usually remains slightly below the offer price to account for the risk that the deal may not close',
      'The target\'s share price moves exactly to the offer price on announcement because arbitrageurs immediately buy up all available shares and eliminate any spread between the market price and the deal price',
      'The target\'s share price is frozen by stock exchange rules at the prior day\'s closing price until the deal closes or is terminated, to prevent insider trading and ensure an orderly market during the process',
    ],
    correct:1,
    explanation:'On announcement, the target\'s stock jumps toward — but usually slightly below — the offer price. The gap (the "arb spread") reflects deal risk: the probability that the deal fails to close due to regulatory issues, financing problems, or a shareholder vote. Merger arbitrage funds buy the target stock at this discount and profit when the deal closes and the spread collapses to zero.',
    perfectAnswer:'When a takeover is announced, the target\'s share price typically surges toward the offer price, reflecting the acquisition premium being offered above the pre-announcement market price. However, it usually settles slightly below the announced offer, creating what is called the arb spread. This spread exists because there is always some probability the deal fails to close — a regulator could block it on antitrust grounds, the acquirer might walk away if financing conditions deteriorate, or shareholders could vote against it. The size of the spread reflects the market\'s implied probability of deal failure: a tight spread signals high confidence; a wide spread signals meaningful deal risk. Merger arbitrage funds take positions in these spreads, buying the target below the deal price and collecting the premium when the deal closes.',
    whyInterviewersLikeIt:'Understanding the arb spread — why the target trades below the deal price — connects the announcement dynamics to merger arbitrage strategy. This shows awareness of how M&A events play out in actual markets, not just in theoretical deal models.',
  },
  {
    id:'ib_v5_5', type:'mcq', difficulty:'Fundamental',
    topic:'Valuation — Terminal Value as % of DCF',
    character:'clara',
    question:'In most DCF analyses, what percentage of the total enterprise value typically comes from the terminal value, and what does this imply about the model\'s sensitivity?',
    options:[
      'Terminal value represents about 10-20% of total DCF value for mature companies, with the majority of value coming from the explicitly modelled near-term cash flows that can be forecasted with reasonable accuracy',
      'Terminal value typically represents 60-80% or more of total DCF value, meaning the model\'s output is highly sensitive to the assumptions used to calculate it — particularly the terminal growth rate and WACC',
      'Terminal value always represents exactly 50% of total DCF value by construction, because the forecast period is specifically chosen to be long enough that both halves of the valuation are equally weighted',
      'Terminal value represents 100% of DCF value for high-growth companies because their near-term cash flows are negative and only the long-run stabilised earnings have any meaningful positive present value',
    ],
    correct:1,
    explanation:'Terminal value typically accounts for 60-80% of total enterprise value in a standard 5-10 year DCF. This is a critical insight: despite all the detailed work building the forecast period, most of the model\'s output is determined by two assumptions — the terminal growth rate and the WACC — which are both highly uncertain. Small changes in either input produce enormous swings in value, which is why sensitivity analysis on these two variables is mandatory.',
    perfectAnswer:'Terminal value typically represents between 60% and 80% of total enterprise value in a DCF, sometimes even higher for high-growth companies where near-term cash flows are modest relative to the long-run earnings power. This concentration has a profound implication: the model\'s output is extremely sensitive to the terminal value assumptions. A one percentage point change in the terminal growth rate can swing enterprise value by 20-30% or more, depending on the gap between WACC and growth rate. This is why analysts always present a sensitivity table showing enterprise value across a range of WACC and terminal growth rate combinations, and why the Gordon Growth Model\'s mathematical properties — the (WACC minus g) denominator — deserve such careful attention.',
    whyInterviewersLikeIt:'Knowing that terminal value dominates DCF output is fundamental, but understanding the practical implication — that sensitivity analysis on the two terminal value inputs is mandatory — shows you use DCF models in practice rather than just building them mechanically.',
  },

    question:'When would you use EV/Revenue instead of EV/EBITDA as your primary valuation multiple?',
    options:[
      'EV/Revenue is used for all companies in consumer sectors because EBITDA margins are too low in consumer businesses to produce a meaningful or reliable EBITDA-based enterprise value calculation',
      'EV/Revenue is used when EBITDA is negative or distorted — common for high-growth companies, pre-revenue startups, or businesses in a heavy investment phase where margins do not yet reflect long-run economics',
      'EV/Revenue is the preferred multiple for all regulated industries because regulators impose caps on EBITDA margins that make EBITDA an unreliable measure of underlying business value for those sectors',
      'EV/Revenue is always preferred because revenue is audited more rigorously than EBITDA, which is a non-GAAP metric subject to significant management manipulation across all industries and geographies',
    ],
    correct:1,
    explanation:'EV/EBITDA breaks down when EBITDA is negative (produces a meaningless or negative multiple) or when margins are temporarily distorted by heavy investment that doesn\'t reflect long-run earning power. High-growth SaaS companies, biotech firms, and early-stage businesses often use EV/Revenue because it remains positive and meaningful even when the business is not yet profitable. It\'s also useful for cross-company comparisons where accounting for R&D or marketing investment varies significantly.',
    perfectAnswer:'EV/Revenue becomes the primary multiple when EBITDA is negative, negligible, or materially distorted from long-run economics. For high-growth technology or SaaS companies investing heavily in sales and marketing or R&D, current EBITDA is intentionally suppressed — it would be misleading to value them on today\'s margins when the investment thesis is based on the margin profile they will achieve at scale. EV/Revenue provides a positive, comparable metric across the peer group regardless of current profitability. It\'s also useful when comparing companies that treat R&D very differently — one may expense it fully while another capitalises a portion — making EBITDA non-comparable without significant adjustments.',
    whyInterviewersLikeIt:'Knowing when a standard tool breaks and what to use instead is more valuable than knowing the tool itself. Explaining why EV/Revenue is analytically appropriate for investment-phase businesses — not just "they have negative EBITDA" — shows genuine valuation judgement.',

  {
    id:'ib_v5_7', type:'mcq', difficulty:'Intermediate',
    topic:'M&A — Hostile vs. Friendly Process',
    character:'victor',
    question:'Why do hostile takeovers typically end up costing the acquirer more than friendly negotiated deals?',
    options:[
      'Hostile deals are more expensive purely because of higher investment banking fees — the additional legal and advisory work required for a contested process adds 15-20% to total transaction costs',
      'Hostile deals force the acquirer to bid high enough to win a shareholder vote without board support, often trigger competing bids, and rarely allow the cost synergy diligence needed to justify a lower price',
      'Hostile deals are more expensive because stock exchange rules require hostile acquirers to pay a mandatory 40% premium above the undisturbed share price regardless of the target\'s actual fundamental value',
      'Hostile deals cost more because the target\'s management team always resigns on announcement, forcing the acquirer to pay large retention bonuses to keep key employees from leaving the combined company',
    ],
    correct:1,
    explanation:'Hostile acquisitions are expensive for several compounding reasons: (1) Without board cooperation, the acquirer must bid high enough to convince shareholders directly — often requiring a premium above what friendly negotiation would have produced; (2) The public nature of a hostile bid invites competing bids from white knights; (3) Without management cooperation, the acquirer gets limited diligence access, so they cannot accurately size cost savings and must build in a larger uncertainty buffer; (4) The process is slower and more expensive, giving the target time to implement defences.',
    perfectAnswer:'Hostile takeovers tend to be more expensive for several interconnected reasons. Without board cooperation, the acquirer cannot access management information or conduct thorough diligence — so they must price in uncertainty, effectively paying more for less information. The public announcement of a hostile bid invites competing offers from white knights, creating an auction dynamic that drives up the price. The acquirer must also bid high enough to directly convince shareholders to tender their shares, bypassing a board that is actively recommending rejection and deploying defences. Additionally, hostile deals are often protracted — during which the target implements additional defences, the acquirer\'s financing conditions may deteriorate, and management team disruption costs mount. All of this compounds into a higher total cost.',
    whyInterviewersLikeIt:'The information asymmetry argument — you pay more because you know less in a hostile deal — is the sophisticated insight that many candidates miss. The compounding effect of all four factors (information, competing bids, shareholder premium, delays) creates a comprehensive explanation.',
  },
  {
    id:'ib_v5_8', type:'mcq', difficulty:'Intermediate',
    topic:'Valuation — Sensitivity Analysis',
    character:'clara',
    question:'Why is a two-variable sensitivity table (WACC vs. terminal growth rate) a standard output of every DCF model?',
    options:[
      'It is a regulatory requirement — the SEC mandates that all fairness opinions include a two-variable sensitivity table for WACC and terminal growth rate as part of the required disclosure in proxy filings',
      'Because both inputs sit in the terminal value denominator as a difference, small changes create disproportionately large valuation swings — the table shows clients the full range of credible values under reasonable assumptions',
      'The sensitivity table is used to identify which combination of assumptions produces the highest valuation, allowing the banker to present the most favourable output to support the client\'s preferred deal price',
      'It is standard practice because WACC and terminal growth rate are the only two inputs in the DCF model — all other inputs like revenue growth and margins are treated as known with certainty',
    ],
    correct:1,
    explanation:'Terminal value = FCF / (WACC - g). Because WACC and g sit in the denominator as a difference, the output is hypersensitive to both. If WACC is 9% and g is 3%, the divisor is 6% and the TV multiple is 16.7x. If g moves to 4%, the divisor is 5% and the multiple is 20x — a 20% swing from a 1% input change. The sensitivity table shows the board or client the full credible range of values, demonstrating that the DCF is not a single precise number but a distribution of outcomes.',
    perfectAnswer:'The two-variable sensitivity table is mandatory because the terminal value denominator — WACC minus the terminal growth rate — amplifies any input change dramatically. If WACC is 9% and g is 3%, the divisor is 6% and the implied terminal multiple is about 16.7x. Move g up one point to 4% and the divisor collapses to 5%, pushing the multiple to 20x — a 20% valuation increase from a single percentage point change. Since both inputs are genuinely uncertain and reasonable analysts might use different estimates, the sensitivity table conveys the honest output: not a single number but a range of values across plausible assumptions. It also protects bankers and boards from being pinned to a single output that could be discredited by questioning one assumption.',
    whyInterviewersLikeIt:'The mathematical explanation — why the denominator structure creates this sensitivity — combined with the practical reason for showing clients a range rather than a point estimate demonstrates both technical and advisory sophistication.',
  },

  {
    id:'ib_v5_9', type:'mcq', difficulty:'Advanced',

    character:'victor',
    question:'What additional complexities arise in cross-border M&A transactions compared to domestic deals?',
    options:[
      'Cross-border deals are simpler than domestic deals because international accounting standards (IFRS) are more consistent than domestic GAAP, reducing the financial statement reconciliation work required during diligence',

    ],
    correct:1,
    explanation:'Cross-border M&A introduces multiple simultaneous complexities: (1) FX risk — deal value changes if exchange rates move between signing and closing; (2) Multi-jurisdictional regulatory approvals — antitrust filings required in each relevant jurisdiction (EU, US, China, etc.) with different timelines and standards; (3) Accounting differences — IFRS vs GAAP restatements needed for comparability; (4) Tax structuring — choosing optimal acquisition vehicle/holding structure across jurisdictions; (5) Cultural integration — management styles, labour law, and business practices vary significantly.',
    perfectAnswer:'Cross-border deals layer several complexities onto an already complex process. On the regulatory side, the deal may require merger clearance from antitrust authorities in multiple jurisdictions simultaneously — the EU, the US DOJ or FTC, China\'s SAMR, and others — each with different standards, timelines, and remedies. FX risk is real: a deal signed at $1.10 per euro and closing six months later at $1.20 has become meaningfully more expensive for the US acquirer. Accounting differences between IFRS and US GAAP require financial statement restatements to make diligence meaningful. Tax structuring is significantly more complex — choosing where to hold the acquisition entity, how to repatriate earnings, and how to structure intercompany financing to minimise global effective tax rates. Finally, integration planning must account for different labour laws, cultural expectations around management style, and varying employee benefits frameworks.',
    whyInterviewersLikeIt:'Covering all five dimensions — regulatory, FX, accounting, tax, and cultural — rather than just one or two shows the breadth of thinking required for cross-border advisory. The SAMR (China) reference signals genuine awareness of the global regulatory landscape.',
  },
  {
    id:'ib_v5_10', type:'typed', difficulty:'Advanced',
    topic:'Valuation — Defending Your Assumptions',
    character:'victor',
    question:'A managing director challenges your DCF, saying your 8% WACC is too low and should be 10%. Walk through how you would defend or adjust your analysis.',
    keywords:['cost','equity','debt','risk','beta','premium','justify','sensitivity','market','assumption'],
    explanation:'Defend by walking through each WACC component with sources: risk-free rate (current Treasury yield), equity risk premium (Damodaran), beta (peer group unlevered and relevered), cost of debt (current trading yield or new debt pricing). Show sensitivity table. If the MD\'s 10% is also defensible, show both and present a range.',
    perfectAnswer:'I would walk through each component of my WACC calculation with the supporting data. The risk-free rate: I used the current 10-year Treasury yield of X% — if the MD believes a higher normalised rate is appropriate, I can use the 20-year average instead. The equity risk premium: I used Damodaran\'s current market ERP of around 5%, which is the standard reference — if there is a sector-specific premium to add, we can discuss the basis. Beta: I unlevered the betas of the five closest public comparables and relevered at our target capital structure — I can show the peer group and methodology. Cost of debt: based on the company\'s existing credit rating and current new-issue spreads for comparable credits. If after reviewing each component the MD still believes 10% is more appropriate, I would not simply capitulate — I would present the valuation at both 8% and 10%, show the implied range, and note where the deal price sits within that range. A sensitivity table already in the model makes this conversation productive rather than adversarial.',
    whyInterviewersLikeIt:'This question tests intellectual confidence — the ability to defend your work with evidence rather than capitulating to seniority. The structured response (walk through each component, cite sources, present both scenarios) shows analytical rigour and the kind of professional composure that clients and MDs expect from analysts.',

     perfectAnswer:'The 3-year investment is clearly superior. MOIC says both are equal at 3x &#8212; it doesn\'t capture timing. IRR tells the real story: 3x in 3 years is roughly 44% IRR; 3x in 7 years is only about 17% IRR. The difference matters enormously to LPs who can redeploy returned capital into new investments.',

    perfectAnswer:'In a European waterfall, distributions follow four sequential steps. First, all LP capital contributions are returned — the fund must pay back everything LPs invested before any profit sharing begins. Second, LPs receive their preferred return on that capital — typically 8% per year compounded. Third, the GP receives a catch-up provision, collecting 100% of distributions until they have received approximately 20% of total profits distributed so far, catching up to their carried interest entitlement. Fourth, all remaining proceeds are split 80% to LPs and 20% to the GP as carried interest. The key feature is that LPs are fully protected first — no GP profit sharing until LPs are whole plus their preferred return.',

  {

    perfectAnswer:'PIK interest is interest that accrues and gets added to the principal balance rather than being paid out in cash. If a company has $100M of PIK debt at 10%, instead of writing a $10M check, the balance becomes $110M — and next year interest accrues on $110M. PE-backed companies use PIK debt in two scenarios: when near-term cash flows are tight and preserving cash is critical (post-LBO deleveraging phase), or when the company is still growing and needs cash to invest in the business. The trade-off is significant — the growing principal creates a larger balloon payment at maturity and means total interest paid over the life of the instrument is much higher than cash-pay debt.',

    perfectAnswer:'Covenant-lite loans contain only incurrence covenants — triggered by specific actions like raising more debt or paying dividends — rather than maintenance covenants that require ongoing financial ratio compliance. They became dominant in PE-backed deals during the 2010s bull market as borrower-friendly conditions gave sponsors more negotiating power. The concern among credit analysts is the loss of early warning: with traditional maintenance covenants, a deteriorating company triggers a covenant breach early, giving lenders leverage to restructure before the situation becomes severe. With cov-lite structures, that warning system is gone. The company can miss its projections significantly without technically defaulting, and by the time a true default occurs, recovery values are often much lower than they would have been under traditional structures.',

  {
    id:'pe_v4_4', type:'mcq', difficulty:'Intermediate',
    topic:'LBO — Debt Tranching and Priority',
    character:'alexander',
    question:'In a leveraged buyout capital structure, how does the priority of claims work across the different debt tranches in a default scenario?',
    options:[
      'All debt tranches rank equally in a default and share proceeds from asset sales on a pro-rata basis — the senior versus junior distinction affects interest rates and covenant packages but not recovery priority',
      'Senior secured debt has first claim on collateral; then senior unsecured; then subordinated or mezzanine debt; then equity — higher priority tranches have lower yields and higher recoveries in default',
      'Equity holders have the first claim in default because they are owners of the business assets — debt holders can only recover proceeds after equity holders have been made whole at their original investment amount',
      'Mezzanine debt has first priority because it bears the highest interest rate — lenders who accept more risk in normal conditions are compensated with priority claim on assets if the company enters bankruptcy',
    ],
    correct:1,
    explanation:'Priority follows the capital structure from top to bottom: (1) Senior secured (first-lien — strongest claim on specific collateral, lowest yield), (2) Senior secured (second-lien — lower priority than first-lien on the same collateral), (3) Senior unsecured (claims on assets not pledged, higher yield), (4) Subordinated/mezzanine (junior to all senior debt, highest debt yield), (5) Equity (last — gets nothing until all debt is paid in full). Recovery rates decrease as you move down the structure.',
    perfectAnswer:'In a default, claims are paid in strict priority order. First-lien senior secured debt has the strongest claim — it is secured against specific collateral (usually all assets of the company) and is repaid first from liquidation proceeds, which is why it carries the lowest interest rate. Second-lien secured debt sits behind first-lien but ahead of unsecured creditors on the same collateral. Senior unsecured creditors have claims on unencumbered assets and recover after secured lenders. Subordinated or mezzanine debt is junior to all senior obligations and only participates in recovery after senior creditors are made whole — reflecting its higher yield and higher risk. Equity is last and typically receives nothing in a default unless all debt is fully recovered. This "absolute priority rule" is the foundational principle of corporate bankruptcy and explains why riskier positions in the capital structure demand higher returns.',
    whyInterviewersLikeIt:'Naming the absolute priority rule and explaining that it governs the yield structure — lower priority demands higher yield — shows you understand the theory behind capital structure design, not just the ordering of claims.',
  },

     question:'Fund A: 15% return, 20% volatility. Fund B: 12% return, 8% volatility. Assuming a 4% risk-free rate &#8212; which has a better Sharpe ratio?',
     options:['Fund B &#8212; its Sharpe of 1.0 (8% excess return / 8% vol) beats Fund A\'s 0.55 (11% / 20%), generating nearly twice as much return per unit of risk taken','Fund A &#8212; higher absolute return is always superior because it delivers more dollars to investors; risk-adjusted metrics like Sharpe unfairly penalize funds for their investment style','They are equivalent &#8212; both funds exceed the risk-free rate by a similar margin in absolute dollar terms, so investors should focus on total return rather than normalized ratios','The Sharpe ratio cannot be computed without also knowing each fund\'s beta, because beta is required to properly separate systematic from idiosyncratic risk in any return attribution'],
     correct:0,
     explanation:'Sharpe = (Return - Risk-free rate) / Volatility. Fund A: (15%-4%) / 20% = 0.55. Fund B: (12%-4%) / 8% = 1.0. Fund B has a significantly better Sharpe despite lower absolute returns.',
     perfectAnswer:'Fund B wins on Sharpe ratio. Fund A: 11% excess return / 20% volatility = 0.55. Fund B: 8% excess return / 8% volatility = 1.0. Fund B generates almost twice as much return per unit of risk. Comparing raw returns is misleading if the risk profiles differ dramatically.',
     whyInterviewersLikeIt:'This requires doing the arithmetic on the spot and interpreting the result &#8212; showing practitioner-level understanding.'},
    {id:'am_v2_4',type:'mcq',difficulty:'Intermediate',topic:'Portfolio Theory &#8212; MPT',character:'clara',
     question:'What is the core insight of Modern Portfolio Theory (MPT) regarding diversification?',
     options:['Combining assets with less-than-perfect positive correlation reduces portfolio volatility without proportionally reducing expected return &#8212; the so-called \'free lunch\' of diversification','Diversification across enough positions eliminates all risk of loss on individual holdings, guaranteeing that no single position can ever meaningfully impair the overall portfolio value','A portfolio of exactly 30 uncorrelated stocks reaches full diversification; adding more positions beyond that specific threshold actually reduces expected returns through overdiversification','Only systematic market risk earns a return premium in equilibrium, so rational investors should exclusively hold passive index funds rather than any form of active diversified portfolio'],
     correct:0,
     explanation:'Correlation matters as much as individual asset risk. Combining assets with low or negative correlation reduces portfolio volatility below the weighted average &#8212; the "free lunch" of diversification.',
     perfectAnswer:'MPT\'s core insight is that portfolio risk is not the average of individual asset risks &#8212; it depends on how assets move together. When you combine assets with low or negative correlation, portfolio volatility falls below the weighted average of individual volatilities while expected return remains the weighted average. That\'s the "free lunch" of diversification. The efficient frontier formalizes this.',
     whyInterviewersLikeIt:'The best answers go beyond "diversification reduces risk" to explain WHY &#8212; that correlation drives portfolio volatility.'},
    {id:'am_v2_5',type:'mcq',difficulty:'Advanced',topic:'Hedge Funds &#8212; Merger Arbitrage',character:'leo',
     question:'How does a merger arbitrage strategy generate returns, and what is the primary risk?',
     options:['It buys the target stock at a spread below deal price (and often shorts the acquirer) &#8212; the spread closes at deal completion; deal failure causing a blowout is the key risk','It buys both the target and acquirer stock before announcement, profiting from the post-announcement price appreciation that occurs on both sides of the transaction simultaneously','It shorts the acquirer stock to profit from the acquisition premium overhang that depresses acquirer prices post-announcement, then covers the position when the deal formally closes','It invests in the investment-grade debt of both the target and acquirer, capturing yield spread compression that occurs as deal execution certainty and credit quality improve over time'],
     correct:0,
     explanation:'After deal announcement, the target stock trades near-but-below the offer price &#8212; the spread reflects deal completion risk. If the deal closes, the spread goes to zero. If it breaks, the target crashes back to pre-announcement prices.',
     perfectAnswer:'Merger arb buys the target stock at a discount to the announced deal price. The spread is the market\'s implied probability of deal failure. If the deal closes, the spread collapses to zero and the fund collects the premium. In cash deals: buy at $47, collect $50 at close. The primary risk is deal failure &#8212; regulatory blocks, financing disruptions, or shareholder rejection can wipe out months of small spread gains in one day.',
     whyInterviewersLikeIt:'The asymmetric risk profile &#8212; small regular gains vs. occasional catastrophic losses &#8212; is what makes sizing and risk management so important in this strategy.'},
    {id:'am_v2_6',type:'mcq',difficulty:'Intermediate',topic:'Hedge Funds &#8212; Short Selling',character:'leo',
     question:'Walk me through the mechanics of how a hedge fund shorts a stock.',
     options:['The fund borrows shares from a prime broker, sells them at the current price, and profits if the stock falls &#8212; buying back cheaper later and returning the shares to the lender','The fund writes put options on the target stock and collects the upfront premium, which represents the fund\'s maximum achievable profit regardless of how far the stock actually falls','The fund sells index futures on the relevant sector benchmark, creating synthetic short exposure to the target company without needing to locate or borrow any specific shares at all','The fund enters a total return swap with a counterparty, agreeing contractually to pay the counterparty any price appreciation on the target stock above the agreed swap strike price'],
     correct:0,
     explanation:'Physical short selling: borrow shares from a prime broker, pay a borrow rate, sell shares in the market. If the stock falls, buy back cheaper, return to the lender. Risk is unlimited &#8212; if the stock rises, there\'s no cap on losses.',
     perfectAnswer:'The fund instructs its prime broker to borrow shares &#8212; typically sourced from custodian banks or long-only funds. The fund sells those shares and pays a daily borrow rate to the lender. If the stock declines, the fund buys shares back at the lower price, returns them, and keeps the difference. Key risks: unlimited loss potential, forced covering if the broker calls back the shares (a "buy-in"), and short squeeze risk.',
     whyInterviewersLikeIt:'The prime broker relationship, borrow rate, and "buy-in" risk are technical details that show you understand the operational reality of running a short book.'},
    {id:'am_v2_7',type:'mcq',difficulty:'Advanced',topic:'Hedge Funds &#8212; Short Squeeze',character:'leo',
     question:'What is a short squeeze, and what market conditions cause one?',
     options:['A rising price forces short sellers to buy shares to cover losses, which pushes prices higher still &#8212; a self-reinforcing feedback loop that requires high short interest and a catalyst','A regulatory circuit breaker imposed by the SEC that temporarily prohibits any new short positions from being opened in a stock experiencing abnormal upward price volatility','A corporate action in which the company conducts a large accelerated share repurchase program, reducing the public float and mechanically forcing the stock price to move upward','A market-making strategy where designated dealers profit from artificially wide bid-ask spreads by simultaneously holding both long and short positions in the same illiquid security'],
     correct:0,
     explanation:'A short squeeze requires high short interest and a price-rising catalyst. As the stock rises, short sellers are forced to cover (buy shares) to limit losses. That buying pushes the price higher, forcing more short sellers to cover &#8212; a self-reinforcing upward spiral.',
     perfectAnswer:'A short squeeze is a reflexive feedback loop. High short interest + a catalyst = rising price. Short sellers lose money. As losses mount, they\'re forced to buy shares to close positions &#8212; but this buying pushes the price higher, forcing the next wave to cover. The loop accelerates until most shorts are closed. Stocks with high short interest and low float are most vulnerable. GameStop in 2021 is the textbook modern example.',
     whyInterviewersLikeIt:'Explaining the reflexive feedback loop and noting the preconditions (high short interest, low float) shows rigorous market understanding.'},
    {id:'am_v2_8',type:'mcq',difficulty:'Intermediate',topic:'Hedge Funds &#8212; Activist Investing',character:'clara',
     question:'What is activist investing and what are typical demands made by activist shareholders?',
     options:['Activists build large stakes in undervalued companies and push for changes &#8212; spinoffs, buybacks, board seats, or M&A &#8212; to unlock value that passive shareholders haven\'t forced','Activist investors are specialized short sellers who publish detailed research reports exposing accounting fraud, earnings manipulation, or governance irregularities at their target companies','Activist investors focus exclusively on ESG and sustainability objectives, pressuring boards to adopt mandatory carbon reduction targets, diversity mandates, and social impact initiatives','Activists acquire controlling equity stakes through leveraged buyout structures and take companies private, implementing operational restructuring away from public market investor scrutiny'],
     correct:0,

     perfectAnswer:'An activist fund builds a meaningful stake &#8212; typically 5% or more &#8212; in a public company it believes is undervalued. Once disclosed via a 13-D filing, the activist uses its ownership to push for changes: splitting up a conglomerate, returning excess cash via buybacks or dividends, replacing underperforming management, or forcing a sale. Success depends on building support from other institutional shareholders.',
     whyInterviewersLikeIt:'The 13-D disclosure requirement and coalition-building dynamic (needing other institutional support) show genuine knowledge of how activist campaigns work.'},
    {id:'am_v2_9',type:'mcq',difficulty:'Intermediate',topic:'Hedge Funds &#8212; Momentum vs. Mean Reversion',character:'leo',
     question:'What is the difference between momentum investing and mean reversion, and when does each tend to outperform?',
     options:['Momentum buys recent winners expecting continued outperformance; mean reversion bets on price normalization &#8212; momentum works in trending markets, mean reversion in range-bound ones','Momentum relies on fundamental earnings analysis to identify companies with improving business trajectories; mean reversion relies purely on technical price pattern analysis and oscillators','Mean reversion outperforms in bull markets because asset prices always eventually recover to prior highs; momentum outperforms in bear markets by capturing falling-knife reversals','Momentum strategies operate exclusively on intraday and weekly time horizons using high-frequency signals; mean reversion operates only on decade-long fundamental valuation cycles'],
     correct:0,
     explanation:'Momentum assumes trends persist. Mean reversion assumes extremes are temporary. Momentum tends to work in trending macro environments; mean reversion works in choppy, sideways markets.',
     perfectAnswer:'Momentum assumes recent price trends contain information about near-term future performance &#8212; stocks that have risen tend to keep rising, driven by flows, earnings revisions, and narrative. Mean reversion assumes prices overshoot fair value and snap back. Many quantitative funds combine both strategies across different time horizons.',
     whyInterviewersLikeIt:'The best answers note that both strategies have empirical support across different market regimes, and that quant funds often combine them.'},
    {id:'am_v2_11',type:'mcq',difficulty:'Advanced',topic:'Portfolio Theory &#8212; Margin of Safety',character:'clara',
     question:'What does it mean for a security to have a sufficient "margin of safety"?',
     options:['The current market price is significantly below intrinsic value &#8212; providing a buffer that protects against errors in the valuation analysis and against unexpected adverse developments','The security carries a minimum credit rating of BBB or investment grade from at least two major rating agencies, meeting the fund mandate\'s minimum liquidity and credit quality standards','The security trades in a deep and liquid market with tight bid-ask spreads, ensuring the full position can be liquidated at scale without causing meaningful market impact or slippage','The security\'s beta is below 1.0, meaning its price moves less than the broad market, making it inherently \'safer\' from a volatility and maximum drawdown perspective for the portfolio'],
     correct:0,
     explanation:'Margin of safety (Benjamin Graham\'s concept): buying at a meaningful discount to intrinsic value protects against valuation mistakes and adverse events.',
     perfectAnswer:'Margin of safety is a value investing concept from Benjamin Graham: you only invest when the current market price is materially below your estimate of intrinsic value. If intrinsic value is $100 and you pay $65, you have a 35% margin of safety. This buffer protects against errors in your analysis and against unexpected negative developments. The margin of safety shifts the odds in your favor &#8212; you don\'t need to be exactly right to make money.',
     whyInterviewersLikeIt:'The best answers name Graham, explain the dual protection function (valuation error buffer + downside cushion), and articulate the philosophy concisely.'},
    {id:'am_v2_12',type:'typed',difficulty:'Advanced',topic:'Hedge Funds &#8212; AUM Scale Problem',character:'leo',
     question:'Why does it become harder for a hedge fund to generate high returns as its assets under management grow?',
     keywords:['alpha','capacity','liquid','position','market','capital','fund','move'],
     explanation:'Larger funds face market impact &#8212; buying or selling large positions moves prices against you. The best alpha opportunities are in smaller-cap, less liquid securities.',
     perfectAnswer:'The core problem is capacity: the best alpha opportunities are often in less liquid securities where a fund can\'t deploy large capital without moving the market against itself. At $500M AUM, you can take a meaningful position in a $2B market cap stock. At $50B AUM, that same position is irrelevant to NAV. To move the needle, you need enormous positions, but those are only available in large, efficiently priced liquid securities where alpha is scarce. This is why many of the best-performing funds close to new capital.',
     whyInterviewersLikeIt:'Explaining market impact and capacity constraints &#8212; and noting that fund closures to new capital are a logical response &#8212; shows you think about AM as a business.'},

  {
    id:'am_v3_1', type:'mcq', difficulty:'Fundamental',
    topic:'Portfolio Theory — Alpha vs. Beta',
    character:'clara',
    question:'What is the difference between alpha and beta in portfolio management?',
    options:[
      'Beta measures absolute portfolio return; alpha measures risk-adjusted return after subtracting benchmark performance — both are reported as annualized percentages in standard performance reports',
      'Beta measures a portfolio\'s sensitivity to market movements (systematic risk); alpha measures excess return generated above and beyond what beta exposure would predict (manager skill)',
      'Alpha is the expected return based on CAPM; beta is the actual realized return — the gap between them tells investors whether the manager outperformed or underperformed the theoretical prediction',
      'Beta measures the volatility of individual securities within the portfolio; alpha measures the correlation between the portfolio\'s returns and those of its designated benchmark index',
    ],
    correct:1,
    explanation:'Beta = sensitivity to market (systematic risk). A beta of 1.2 means the portfolio moves 1.2% for every 1% market move. Alpha = excess return above what the beta exposure predicts. If the market rises 10%, a beta-1.2 portfolio should return 12%; if it returns 14%, the alpha is +2%. Alpha represents manager skill; beta represents market exposure.',
    perfectAnswer:'Beta measures how much a portfolio or security moves relative to the overall market — its sensitivity to systematic risk. A beta of 1.0 means the portfolio moves in lockstep with the market; 1.5 means it amplifies market moves by 50%; 0.5 means it moves half as much. Alpha is the return generated above and beyond what the beta exposure predicts. If CAPM says a portfolio with beta 1.2 should return 12% when the market returns 10%, and it actually returns 15%, the alpha is +3%. Alpha is the holy grail of active management — it represents genuine skill or informational advantage that generates returns independent of market direction.',
    whyInterviewersLikeIt:'Alpha and beta are foundational to performance attribution. The best answers go beyond definitions to show you understand them as a decomposition of returns — what came from market exposure versus what came from skill.',
  },
  {
    id:'am_v3_2', type:'mcq', difficulty:'Fundamental',
    topic:'Portfolio Theory — Tracking Error',
    character:'clara',
    question:'What is tracking error and what does a high tracking error signal about a portfolio manager\'s approach?',
    options:[
      'Tracking error is the difference between a portfolio\'s reported return and its audited return — high tracking error signals potential calculation errors in the fund administrator\'s performance attribution system',
      'Tracking error is the annualized standard deviation of the difference between a portfolio\'s returns and its benchmark returns — high tracking error signals the manager takes large active bets away from the benchmark',
      'Tracking error is the percentage of portfolio holdings that differ from the benchmark index — a fund with 70% overlap has 30% tracking error and is considered an active fund by SEC definitions',
      'Tracking error measures how long it takes for a portfolio\'s returns to revert to the benchmark mean after a period of over or underperformance — high tracking error means slower mean reversion',
    ],
    correct:1,
    explanation:'Tracking error = standard deviation of (portfolio return minus benchmark return). A low tracking error portfolio closely mirrors the index (closet indexer). A high tracking error portfolio makes large active bets — its returns can deviate significantly from the benchmark, for better or worse. It\'s a measure of active risk, not total risk.',
    perfectAnswer:'Tracking error is the annualised standard deviation of the portfolio\'s excess returns relative to its benchmark. A tracking error of 1% means the portfolio\'s returns differ from the benchmark by about 1% per year on average. High tracking error — say 8-10% — signals that the manager is taking large active positions that deviate substantially from the index. This could be concentrated sector bets, large overweights in individual names, or a significant geographic tilt. Low tracking error (1-2%) suggests a manager who mostly mirrors the index with minor tilts — sometimes called a "closet indexer" if the manager charges active management fees. Information ratio, which divides alpha by tracking error, measures whether those active bets are generating sufficient excess return to justify the risk taken.',
    whyInterviewersLikeIt:'Connecting tracking error to the information ratio — and noting the closet indexer problem — shows you understand tracking error in its proper context as a measure of active risk that must be justified by excess returns.',
  },
  {
    id:'am_v3_3', type:'mcq', difficulty:'Fundamental',
    topic:'Portfolio Theory — Benchmark Selection',

    question:'Why does benchmark selection matter so much in evaluating a portfolio manager\'s performance?',

      'Benchmark selection only matters for regulatory reporting purposes — the actual investment decisions and risk management process are completely unaffected by which index is chosen as the comparison',
      'An inappropriate benchmark makes outperformance trivially easy or performance look artificially poor — a manager\'s skill can only be assessed if the benchmark accurately reflects the investment universe and risk profile',
      'Benchmark selection is irrelevant because the Sharpe ratio is an absolute measure that does not require any comparison to an external index to evaluate risk-adjusted performance accurately',
      'All institutional managers are required by the CFA Institute to use the S&P 500 as their performance benchmark regardless of investment strategy, asset class, or geographic focus',

    perfectAnswer:'Benchmark selection is foundational to performance evaluation because alpha is defined as excess return relative to a benchmark. If the benchmark is wrong, the alpha calculation is meaningless. A small-cap value manager should not be measured against the large-cap growth Russell 1000 Growth index. If they outperform, it might simply be that small-cap value outperformed large-cap growth that year — not skill. A good benchmark is investable (you could passively hold it), representative of the manager\'s opportunity set, and agreed upon in advance. The benchmark also drives risk measurement: tracking error and information ratio are only meaningful if the benchmark correctly represents what the manager is being paid to beat.',

  },

    perfectAnswer:'The Sharpe Ratio evaluates a portfolio in isolation: excess return above the risk-free rate divided by total portfolio volatility. It answers the question "is this portfolio efficiently compensating investors for all the risk they\'re taking?" The Information Ratio is specifically about active management: alpha divided by tracking error. It asks "is the manager generating sufficient excess return to justify the active bets they\'re taking away from the benchmark?" A manager with alpha of 3% and tracking error of 15% has an IR of 0.2 — not great. A manager with alpha of 2% and tracking error of 3% has an IR of 0.67 — excellent. The IR is the primary tool for evaluating whether active management fees are justified.',

  {
    id:'am_v3_5', type:'mcq', difficulty:'Intermediate',
    topic:'Portfolio Theory — Value at Risk (VaR)',
    character:'leo',
    question:'What is VaR and what are its most significant limitations as a risk management tool?',
    options:[
      'VaR measures the average expected loss in a portfolio over any given time period — its primary limitation is that it requires daily mark-to-market pricing which is unavailable for illiquid private assets',
      'VaR estimates the maximum loss not expected to be exceeded at a given confidence level over a time horizon — its critical limitation is that it says nothing about how bad losses could be beyond that threshold',
      'VaR measures portfolio beta relative to a benchmark index — its limitation is that it assumes all assets have constant correlations with the market, which breaks down during earnings seasons',
      'VaR is the minimum return expected from a portfolio at a given confidence level — its limitation is that it can be gamed by managers who restructure their portfolios at quarter-end reporting dates',
    ],
    correct:1,
    explanation:'VaR: "There is an X% probability that losses will not exceed $Y over time period T." A 95% one-day VaR of $1M means on 95% of days, losses should not exceed $1M. The critical flaw: it says nothing about the other 5% — the losses in the tail could be $2M, $50M, or $500M. VaR is silent on tail severity.',
    perfectAnswer:'VaR — Value at Risk — is a statistical measure that estimates the maximum loss a portfolio should experience over a given time period at a specified confidence level. A 95% one-day VaR of $10 million means that on 95% of trading days, losses should not exceed $10 million. The critical limitation is that VaR is silent about what happens in the tail — the other 5% of days. It tells you where the loss threshold is but not how catastrophic losses could be once that threshold is crossed. During the 2008 crisis, losses for many portfolios far exceeded their modelled VaR precisely because extreme market conditions violated the distributional assumptions underlying VaR models. Expected Shortfall — or Conditional VaR — addresses this by measuring the average loss in the tail, which is why sophisticated risk managers use it alongside VaR.',
    whyInterviewersLikeIt:'The "silent on tail severity" critique is the single most important VaR limitation. Candidates who also mention Expected Shortfall as the remedy, and connect the limitation to a real crisis example, demonstrate genuine risk management sophistication.',
  },
  {
    id:'am_v3_6', type:'mcq', difficulty:'Intermediate',
    topic:'Portfolio Theory — Factor Investing',
    character:'clara',
    question:'What are the five original Fama-French factors and what is the theoretical basis for why each should generate a return premium?',
    options:[
      'Growth, value, momentum, quality, and low volatility — all five are pricing anomalies discovered by Fama and French that the market systematically misprices due to behavioral biases',
      'Market, size, value, profitability, and investment — each represents a dimension of systematic risk or behavioural mispricing that historically generates excess returns over the market portfolio',
      'Equity, fixed income, commodities, currencies, and real estate — five asset classes whose return premiums compound independently to generate higher risk-adjusted returns than any single asset class',
      'Beta, alpha, gamma, delta, and theta — the Greek letter framework developed by Fama and French to decompose option-like payoffs embedded in individual equity securities',
    ],
    correct:1,
    explanation:'Fama-French expanded CAPM\'s single factor (market beta) to explain more of the cross-section of returns. The five factors: (1) Market — equity risk premium; (2) Size (SMB) — small caps historically outperform; (3) Value (HML) — cheap stocks outperform expensive; (4) Profitability (RMW) — profitable firms outperform; (5) Investment (CMA) — conservative investors outperform aggressive. Each has a risk-based or behavioural explanation for why the premium exists.',
    perfectAnswer:'The Fama-French five-factor model extends CAPM by adding four factors to the original market premium. Size (SMB — small minus big): small-cap stocks have historically outperformed, theoretically because they carry higher distress risk. Value (HML — high minus low book-to-market): cheap stocks outperform expensive ones, either because they are genuinely riskier or because investors systematically overpay for growth. Profitability (RMW — robust minus weak): more profitable firms outperform, reflecting that current profitability predicts future cash flows. Investment (CMA — conservative minus aggressive): firms that invest conservatively outperform aggressive investors, possibly because aggressive investment signals overconfidence. Together these factors explain a much larger portion of the cross-section of equity returns than market beta alone, which is why factor investing became the dominant framework for both smart beta ETFs and quantitative active management.',
    whyInterviewersLikeIt:'Knowing all five factors with their academic abbreviations and the theoretical rationale for each premium shows genuine quantitative investment knowledge. The debate between risk-based and behavioural explanations for value and size is a sophisticated touch.',
  },

  {

    character:'leo',
    question:'How does a convertible bond arbitrage strategy generate returns and what are its key risks?',
    options:[
      'Convertible arbitrage buys convertible bonds and shorts the underlying stock to isolate and profit from mispricing of the embedded equity option, earning returns from volatility and credit convergence',
      'Convertible arbitrage buys the equity of companies that have announced convertible bond issuances, profiting from the temporary price dislocation that always follows the announcement date',
      'Convertible arbitrage shorts overpriced convertible bonds and buys the underlying stock in equal notional amounts, profiting when the conversion premium collapses toward its theoretical fair value',
      'Convertible arbitrage buys two convertible bonds from the same issuer with different maturities, profiting from the yield curve normalization that occurs as both bonds approach their conversion dates',
    ],
    correct:0,
    explanation:'Convertible bonds have an embedded call option on the stock. Arb strategy: buy the convertible (getting bond + embedded option cheaply), short the stock to hedge the equity delta, and profit from the mispriced optionality. Returns come from the implied volatility premium, coupon income, and short stock rebate. Risks: credit risk on the issuer, gamma risk, and correlation breakdown in stress.',
    perfectAnswer:'Convertible bonds are hybrid instruments — a corporate bond with an embedded call option on the issuer\'s stock. Convertible arbitrage exploits the fact that this embedded option is often mispriced: the convertible trades at an implied volatility below what options on the same stock trade for in the market. The strategy buys the convertible bond (cheap optionality plus bond floor protection) and dynamically hedges the equity exposure by shorting the stock in proportion to the delta. Returns come from three sources: the implied volatility pick-up as the option is held and hedged (gamma trading), bond coupon income, and the short stock rebate earned on the equity short. Key risks are credit deterioration of the issuer (which destroys the bond floor), gamma risk from rapid stock movements, and the structural risk of forced deleveraging during market stress — when multiple funds unwind simultaneously, spreads gap out violently.',
    whyInterviewersLikeIt:'Convertible arb is genuinely complex — it requires understanding bonds, options, delta hedging, and credit simultaneously. Candidates who can explain all three return sources and the specific stress-period breakdown risk show sophisticated hedge fund knowledge.',
  },
  {

    perfectAnswer:'I\'d open with the one-line thesis: what the position is, which direction, and the core reason — for example "Long Company X, a mispriced market leader in workflow automation where the market is underestimating the durability of its switching costs." Then I\'d briefly describe the business to establish context. The core of the pitch is the investment thesis — two or three specific, differentiated reasons why the stock is mispriced that the market hasn\'t fully appreciated. Then valuation: what I think it\'s worth and why, using comps and a DCF sensitivity, with a target price and implied upside. Then catalysts: specific events or data points over the next 6-18 months that would close the gap between current price and fair value. Finally, I\'d address the key risks and how I\'d know if the thesis is broken — what would make me exit. The whole pitch should take about five minutes and leave the PM with a clear sense of the upside, downside, and what drives my conviction.',
